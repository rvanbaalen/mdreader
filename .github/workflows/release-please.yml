name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run dist:zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload zip to release
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: dist/*.zip

      - name: Update Homebrew tap
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_FILE=$(ls dist/*.zip | head -1)
          ZIP_NAME=$(basename "$ZIP_FILE")
          SHA256=$(shasum -a 256 "$ZIP_FILE" | awk '{print $1}')

          FORMULA=$(cat <<RUBY
          cask "mdreader" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/rvanbaalen/mdreader/releases/download/${TAG_NAME}/${ZIP_NAME}"
            name "mdreader"
            desc "A beautiful macOS markdown reader"
            homepage "https://github.com/rvanbaalen/mdreader"

            app "mdreader.app"

            zap trash: [
              "~/Library/Application Support/mdreader",
              "~/Library/Preferences/com.rvanbaalen.mdreader.plist",
            ]
          end
          RUBY
          )

          # Update the tap repo via GitHub API
          EXISTING=$(gh api repos/rvanbaalen/homebrew-mdreader/contents/Casks/mdreader.rb --jq '.sha' 2>/dev/null || echo "")
          ENCODED=$(echo "$FORMULA" | base64)

          if [ -n "$EXISTING" ]; then
            gh api repos/rvanbaalen/homebrew-mdreader/contents/Casks/mdreader.rb \
              -X PUT \
              -f message="chore: update mdreader to ${VERSION}" \
              -f content="$ENCODED" \
              -f sha="$EXISTING"
          else
            gh api repos/rvanbaalen/homebrew-mdreader/contents/Casks/mdreader.rb \
              -X PUT \
              -f message="chore: add mdreader ${VERSION}" \
              -f content="$ENCODED"
          fi
