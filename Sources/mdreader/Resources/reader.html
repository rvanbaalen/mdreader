<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>STYLE_PLACEHOLDER</style>
<script>MARKED_PLACEHOLDER</script>
<script>HLJS_PLACEHOLDER</script>
<script>PURIFY_PLACEHOLDER</script>
</head>
<body>
<article class="content" id="content"></article>
<script>
// Configure marked
const renderer = new marked.Renderer();
renderer.code = function({ text, lang }) {
  const highlighted = lang && hljs.getLanguage(lang)
    ? hljs.highlight(text, { language: lang }).value
    : hljs.highlightAuto(text).value;
  const langAttr = lang ? ' data-lang="' + lang + '"' : '';
  return '<pre' + langAttr + '><code class="hljs">' + highlighted + '</code></pre>';
};
marked.use({ renderer: renderer, gfm: true, breaks: false });

function renderMarkdown(md) {
  // Sanitize with DOMPurify before inserting into DOM
  const raw = marked.parse(md);
  const safe = DOMPurify.sanitize(raw, {
    ADD_TAGS: ['input'],
    ADD_ATTR: ['type', 'checked', 'disabled', 'data-lang'],
  });
  const el = document.getElementById('content');
  // Clear via safe DOM method, then insert sanitized HTML
  while (el.firstChild) el.removeChild(el.firstChild);
  const tpl = document.createElement('template');
  tpl.innerHTML = safe;
  el.appendChild(tpl.content);
  // Collect headings for ToC
  const headings = [];
  document.querySelectorAll('h1, h2, h3, h4').forEach(function(h, i) {
    h.id = 'heading-' + i;
    headings.push({ id: h.id, text: h.textContent, level: parseInt(h.tagName[1]) });
  });
  window.webkit.messageHandlers.headings.postMessage(JSON.stringify(headings));
}

function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
}

function scrollToHeading(id) {
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Report scroll position for active ToC tracking
document.addEventListener('scroll', function() {
  var headings = document.querySelectorAll('h1, h2, h3, h4');
  var activeId = '';
  headings.forEach(function(h) {
    if (h.getBoundingClientRect().top <= 80) activeId = h.id;
  });
  window.webkit.messageHandlers.scroll.postMessage(activeId);
}, { passive: true });
</script>
</body>
</html>
