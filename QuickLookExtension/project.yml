name: QuickLookPreview
options:
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.4"

targets:
  QuickLookPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: ../Sources/mdreader-quicklook/PreviewProvider.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rvanbaalen.mdreader.quicklook
        PRODUCT_NAME: QuickLookPreview
        INFOPLIST_FILE: Info.plist
        SWIFT_VERSION: "5"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_APP_SANDBOX: YES
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
